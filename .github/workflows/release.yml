name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.1.0). Must already exist.'
        required: true
        type: string

env:
  NODE_VERSION: 22

jobs:
  build-native:
    name: Build native ${{ matrix.settings.target }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            build: yarn ci --target x86_64-apple-darwin && rm glimpse-tty-native-rs.darwin-arm64.node
          - host: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            build: yarn ci --target x86_64-unknown-linux-gnu
          - host: macos-latest
            target: aarch64-apple-darwin
            build: yarn ci --target aarch64-apple-darwin
          - host: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            build: yarn ci --target aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.settings.host }}
    env:
      MACOSX_DEPLOYMENT_TARGET: '10.13'
    defaults:
      run:
        working-directory: glimpse-tty-native-rs
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: glimpse-tty-native-rs/yarn.lock
      - name: Install dependencies
        run: yarn install
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: glimpse-tty-native-rs/glimpse-tty-native-rs.*.node
          if-no-files-found: error

  publish-native:
    name: Publish native binaries
    runs-on: ubuntu-latest
    needs: [build-native]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: native-artifacts
          pattern: bindings-*
      - name: Get native version
        id: get_version
        run: |
          VERSION=$(node -p "require('./glimpse-tty-native-rs/package.json').version")
          echo "version=glimpse-tty-native-rs-${VERSION}" >> $GITHUB_OUTPUT
      - name: Create native release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.get_version.outputs.version }}
          name: ${{ steps.get_version.outputs.version }}
          artifacts: "native-artifacts/**/*.node"
          allowUpdates: true
          makeLatest: false
          generateReleaseNotes: false
          token: ${{ secrets.GITHUB_TOKEN }}

  pack:
    name: Pack ${{ matrix.platform }}-${{ matrix.arch }}
    needs: [build-native]
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: macos-latest
            platform: darwin
            arch: arm64
            rust-target: aarch64-apple-darwin
          - host: macos-13
            platform: darwin
            arch: x64
            rust-target: x86_64-apple-darwin
    runs-on: ${{ matrix.host }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download native binary
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.rust-target }}
          path: native-binary

      - name: Place native binary
        run: find native-binary -name '*.node' -exec cp {} glimpse-tty-native-rs/ \;

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0

      - name: Install dependencies
        run: bun install

      - name: Verify native addon binary
        run: |
          set -euo pipefail
          case "${{ matrix.arch }}" in
            arm64) NATIVE_BIN=glimpse-tty-native-rs.${{ matrix.platform }}-arm64.node ;;
            x64)   NATIVE_BIN=glimpse-tty-native-rs.${{ matrix.platform }}-x64.node ;;
          esac
          BIN_PATH="glimpse-tty-native-rs/${NATIVE_BIN}"
          if [[ ! -f "$BIN_PATH" ]]; then
            echo "Missing $BIN_PATH"
            exit 1
          fi
          SIZE=$(stat -f %z "$BIN_PATH" 2>/dev/null || stat -c %s "$BIN_PATH")
          if [[ "$SIZE" -lt 10000 ]]; then
            echo "Native addon binary at $BIN_PATH is suspiciously small ($SIZE bytes)."
            exit 1
          fi
          echo "Native addon binary OK: $BIN_PATH ($SIZE bytes)"

      - name: Resolve version from tag
        id: version
        run: |
          set -euo pipefail
          TAG_REF="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG_REF#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Pack distribution
        env:
          GLIMPSE_TTY_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/pack.sh

      - name: Compute archive metadata
        id: archive
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="glimpse-tty-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          ARCHIVE_PATH="build/${ARCHIVE}"
          test -f "$ARCHIVE_PATH" || { echo "Missing archive: $ARCHIVE_PATH"; exit 1; }
          SHA256=$(shasum -a 256 "$ARCHIVE_PATH" | awk '{print $1}')
          echo "$SHA256  $ARCHIVE" > "${ARCHIVE_PATH}.sha256"
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "archive_path=${ARCHIVE_PATH}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.archive }}
          path: |
            ${{ steps.archive.outputs.archive_path }}
            ${{ steps.archive.outputs.archive_path }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [pack]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: glimpse-tty-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create or update Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          artifacts: 'artifacts/*.tar.gz,artifacts/*.tar.gz.sha256'
          allowUpdates: true
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
